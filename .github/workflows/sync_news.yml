name: Sincronizzazione Notizie Globali (Automazione H24)

on:
  schedule:
    # Esegue una volta al giorno alle 04:00 UTC (evita run frequenti e ban)
    - cron: "0 4 * * *"
  workflow_dispatch: # Avvio manuale da GitHub Actions

jobs:
  fetch_and_update_db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 firebase-admin

      - name: Inserisci le Credenziali di Firebase (se configurate)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "⚠️  Secret FIREBASE_SERVICE_ACCOUNT non configurato. Sincronizzazione Firebase saltata."
            echo "FIREBASE_AVAILABLE=false" >> $GITHUB_ENV
          else
            echo "$FIREBASE_SERVICE_ACCOUNT" | jq '.' > backend/serviceAccountKey.json
            chmod 600 backend/serviceAccountKey.json
            echo "✅ Credenziali Firebase pronte."
            echo "FIREBASE_AVAILABLE=true" >> $GITHUB_ENV
          fi

      - name: Lancia l'aggiornamento notizie
        run: |
          python backend/fetch_news.py

      - name: Verifica sincronizzazione Firebase
        run: |
          if [ "$FIREBASE_AVAILABLE" = "false" ]; then
            echo "::error::Firebase sync non eseguita: secret FIREBASE_SERVICE_ACCOUNT mancante. Vai su Settings → Secrets → Actions e aggiungi il JSON della service account."
            exit 1
          fi
